apiVersion: v1
kind: Namespace
metadata:
  name: qdrant
---
# HelmRepository — звичайний HTTP Helm реєстр (не OCI)
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: qdrant
  namespace: flux-system
spec:
  interval: 1h
  url: https://qdrant.github.io/qdrant-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: qdrant
spec:
  interval: 1h
  releaseName: qdrant
  chart:
    spec:
      chart: qdrant
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: qdrant
        namespace: flux-system
  install:
    createNamespace: true
  values:
    replicaCount: 1
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    service:
      type: ClusterIP
      ports:
        rest: 6333
        grpc: 6334
