apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: mcp-governance
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/lderl/abox-lab-n-3/mcp-governance-chart
  ref:
    tag: latest
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-governance
  namespace: flux-system
spec:
  interval: 1h
  releaseName: mcp-governance
  targetNamespace: mcp-governance
  dependsOn:
    - name: kagent
      namespace: kagent
  chartRef:
    kind: OCIRepository
    name: mcp-governance
    namespace: flux-system
  install:
    createNamespace: true
  values:
    createNamespace: true
    # Образи з публічного ghcr.io оригінального репо
    controller:
      image:
        repository: ghcr.io/techwithhuz/mcp-governance-controller
        tag: latest
        pullPolicy: IfNotPresent
    dashboard:
      image:
        repository: ghcr.io/techwithhuz/mcp-governance-dashboard
        tag: latest
        pullPolicy: IfNotPresent
    crds:
      installExternal: false   # kagent CRDs вже встановлені
    samples:
      install: true            # встановити sample GovernancePolicy
    governancePolicy:
      spec:
        targetNamespaces:
          - kagent              # сканувати наш MCP сервер і агент
        excludeNamespaces:
          - kube-system
          - kube-public
          - kube-node-lease
          - local-path-storage
        aiAgent:
          enabled: false        # без AI scoring для лабораторної
