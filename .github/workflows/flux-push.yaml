name: Push releases and charts as OCI artifacts

on:
  push:
    tags:
      - 'v*'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifact
        id: push
        run: |
          TAG=${GITHUB_REF_NAME#v}
          digest=$(flux push artifact oci://ghcr.io/${{ github.repository }}/releases:${TAG} \
            --path="./releases" \
            --source="${{ github.repositoryUrl }}" \
            --revision="${{ github.ref_name }}@sha1:${{ github.sha }}" \
            --output json | jq -r '.digest')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Tag artifact
        run: |
          flux tag artifact \
            oci://ghcr.io/${{ github.repository }}/releases:${{ steps.push.outputs.tag }}@${{ steps.push.outputs.digest }} \
            --tag latest

      # ── agentregistry Helm chart → OCI ──
      - name: Package and push agentregistry chart
        id: helm-push
        run: |
          TAG=${{ steps.push.outputs.tag }}
          helm package ./charts/agentregistry --version "${TAG}" --destination /tmp/helm-pkg
          helm push "/tmp/helm-pkg/agentregistry-${TAG}.tgz" \
            "oci://ghcr.io/${{ github.repository }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # # - name: Tag agentregistry chart as latest
      #   run: |
      #     flux tag artifact \
      #       oci://ghcr.io/${{ github.repository }}/agentregistry-chart:${{ steps.helm-push.outputs.tag }} \
      #       --tag latest

